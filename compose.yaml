services:
  app:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "8180:8080"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8080"
